<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: Poppins;
        background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .card {
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(15px);

        padding: 40px;

        border-radius: 25px;

        width: 350px;

        text-align: center;

        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      }

      h2 {
        color: #6a11cb;
        margin-bottom: 25px;
      }

      input {
        width: 100%;

        padding: 14px;

        margin: 12px 0;

        border-radius: 12px;

        border: 1px solid #ddd;

        font-size: 15px;
      }

      input:focus {
        outline: none;
        border-color: #2575fc;
      }

      button {
        width: 100%;

        padding: 14px;

        border: none;

        border-radius: 12px;

        background: linear-gradient(to right, #6a11cb, #2575fc);

        color: white;

        font-size: 16px;

        font-weight: bold;

        cursor: pointer;
      }

      button:hover {
        transform: scale(1.02);
      }

      a {
        display: block;
        margin-top: 15px;
        text-decoration: none;
        color: #2575fc;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h2>MamaMetrics Login</h2>

      <form method="POST">
        <input type="email" name="email" placeholder="Email" required />

        <input
          type="password"
          name="password"
          placeholder="Password"
          required
        />

        <button type="submit">Login</button>
      </form>

      <a href="/register">Create Account</a>
    </div>
  </body>
</html>
