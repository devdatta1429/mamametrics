<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{font-family:Poppins;background:linear-gradient(45deg,#0f0c29,#302b63,#24243e);display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.card{background:rgba(255,255,255,0.9);padding:30px;border-radius:20px;width:320px;text-align:center}
input{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:1px solid #ccc}
button{width:100%;padding:12px;border:none;border-radius:10px;background:#2575fc;color:white;font-weight:bold}
a{display:block;margin-top:10px;text-decoration:none;color:#6a11cb}
</style>
</head>
<body>
<div class="card">
<h2>Register</h2>
<form method="POST">
<input type="text" name="name" placeholder="Name">
<input type="email" name="email" placeholder="Email">
<input type="password" name="password" placeholder="Password">
<button type="submit">Register</button>
</form>
<a href="/login">Already have account? Login</a>
</div>
</body>
</html>
