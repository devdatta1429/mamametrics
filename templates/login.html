<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>MamaMetrics Login</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        height: 100vh;

        display: flex;
        justify-content: center;
        align-items: center;

        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);

        overflow: hidden;
      }

      .bg-circle {
        position: absolute;

        width: 300px;
        height: 300px;

        border-radius: 50%;

        background: rgba(255, 255, 255, 0.1);

        filter: blur(50px);

        animation: float 6s infinite alternate;
      }

      .bg1 {
        top: -100px;
        left: -100px;
      }

      .bg2 {
        bottom: -100px;
        right: -100px;
      }

      @keyframes float {
        from {
          transform: translateY(0px);
        }

        to {
          transform: translateY(30px);
        }
      }

      .container {
        position: relative;

        width: 380px;

        padding: 40px;

        border-radius: 25px;

        background: rgba(255, 255, 255, 0.12);

        backdrop-filter: blur(20px);

        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);

        border: 1px solid rgba(255, 255, 255, 0.2);

        color: white;

        text-align: center;
      }

      .logo {
        font-size: 40px;
        margin-bottom: 10px;
      }

      h1 {
        font-size: 32px;
        margin-bottom: 10px;
      }

      .subtitle {
        font-size: 14px;
        opacity: 0.8;
        margin-bottom: 30px;
      }

      .input-box {
        margin-bottom: 20px;
        text-align: left;
      }

      .input-box label {
        font-size: 14px;
        margin-bottom: 8px;
        display: block;
      }

      .input-box input {
        width: 100%;

        padding: 14px;

        border: none;

        border-radius: 12px;

        background: rgba(255, 255, 255, 0.15);

        color: white;

        font-size: 15px;

        outline: none;

        transition: 0.3s;
      }

      .input-box input::placeholder {
        color: #ddd;
      }

      .input-box input:focus {
        background: rgba(255, 255, 255, 0.25);

        transform: scale(1.02);
      }

      button {
        width: 100%;

        padding: 14px;

        border: none;

        border-radius: 12px;

        background: linear-gradient(45deg, #ff4b91, #ff7676);

        color: white;

        font-size: 16px;

        font-weight: bold;

        cursor: pointer;

        transition: 0.3s;
      }

      button:hover {
        transform: translateY(-3px);

        box-shadow: 0 10px 20px rgba(255, 118, 118, 0.4);
      }

      .register-link {
        margin-top: 20px;
        font-size: 14px;
      }

      .register-link a {
        color: #ffb6d5;

        text-decoration: none;

        font-weight: bold;
      }

      .register-link a:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <div class="bg-circle bg1"></div>
    <div class="bg-circle bg2"></div>

    <div class="container">
      <div class="logo">👶</div>

      <h1>MamaMetrics</h1>

      <p class="subtitle">Advanced Maternal Health Analytics</p>

      <form method="POST">
        <div class="input-box">
          <label>Email</label>

          <input
            type="email"
            name="email"
            placeholder="Enter your email"
            required
          />
        </div>

        <div class="input-box">
          <label>Password</label>

          <input
            type="password"
            name="password"
            placeholder="Enter your password"
            required
          />
        </div>

        <button type="submit">Login</button>
      </form>

      <div class="register-link">
        Don't have an account?

        <a href="/register">Register</a>
      </div>
    </div>
  </body>
</html>
